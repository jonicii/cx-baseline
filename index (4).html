  {id:"partner",num:"02",title:"Partner-Delivered Experience",subtitle:"High Variability & Limited Visibility",stat:"2+",statCtx:"years behind",statLabel:"Many customers running outdated AutoStore software",summary:"Partner service varies dramatically. Many SLAs exclude software upgrades and proactive maintenance. Some large partners follow a ‘build-it-and-don’t-touch-it’ approach, blocking innovation delivery.",implications:["Experience differs based on which partner they bought through","Customers blend partner issues into AutoStore perception","Innovation blockage — customers never see improvements we develop","No systematic way to know what partners have sold or promised"],quote:"Customers may blame AutoStore for issues that stem from partner shortcomings."},

    <p style={{fontFamily:font,fontSize:14,color:B.textBody,margin:"0 0 28px",maxWidth:600}}>The fundamental problems beneath the symptoms — validated by baseline evidence.</p>

// ─── Close ───────────────────────────────────────────────────────────────────
function CloseSlide(){return(
  <div style={{minHeight:"100vh",position:"relative",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:"80px 40px",textAlign:"center",overflow:"hidden"}}>

      </div>
      <div style={{fontFamily:font,fontSize:12,color:B.textMuted}}>CX Baseline Report · Q1 2026 · Jonas Jakobsen</div>
    </div>
  </div>
)}

// ─── Main ────────────────────────────────────────────────────────────────────
function App(){
  const[cur,setCur]=useState(0);const refs=useRef([]);
  useEffect(()=>{const h=e=>{if(e.key==="ArrowRight"||e.key==="ArrowDown"){e.preventDefault();setCur(c=>Math.min(c+1,SLIDES.length-1))}else if(e.key==="ArrowLeft"||e.key==="ArrowUp"){e.preventDefault();setCur(c=>Math.max(c-1,0))}};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h)},[]);
  useEffect(()=>{refs.current[cur]?.scrollIntoView({behavior:"smooth"})},[cur]);
  useEffect(()=>{const obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){const i=refs.current.indexOf(e.target);if(i!==-1)setCur(i)}}),{threshold:0.4});refs.current.forEach(r=>r&&obs.observe(r));return()=>obs.disconnect()},[]);
  const assign=useCallback((el,i)=>{refs.current[i]=el},[]);
  const slides=[<CoverSlide key="c"/>,<ExecSlide key="e"/>,<FindingsSlide key="f"/>,<PrinciplesSlide key="p"/>,<WhySlide key="w"/>,<ForwardSlide key="fw"/>,<CloseSlide key="cl"/>];
  return <>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>{`*{box-sizing:border-box;margin:0;padding:0}::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:${B.borderOnGray};border-radius:2px}::selection{background:rgba(240,76,61,0.15)}@media(max-width:768px){.nl{display:none!important}.fg{grid-template-columns:1fr!important}.sb{display:none!important}}`}</style>
    <Nav current={cur} onNav={setCur} total={SLIDES.length}/>
    <div>{slides.map((c,i)=><div key={i} ref={el=>assign(el,i)}>{c}</div>)}</div>
  </>
}

  </script>
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
